name: CMake-Mac

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VSCP_ROOT: ${{ github.workspace }}/third_party/vscp

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.1
          host: mac
          target: desktop
          arch: clang_64
          modules: qtcharts qtconnectivity qtserialbus qtserialport qtwebsockets

      - name: Install system dependencies
        run: |
          brew update
          brew install expat libwebsockets mosquitto openssl@3 ninja

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DVSCP_ROOT=${VSCP_ROOT} \
            -DVSCP_PATH=${VSCP_ROOT} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build --config ${BUILD_TYPE} --parallel

      - name: Install
        run: cmake --install build --config ${BUILD_TYPE} --prefix "${{ github.workspace }}/install"

      - name: Pack install tree
        run: |
          tar -C "${{ github.workspace }}" -czf "${{ github.workspace }}/vscp-works-qt-macos-install.tar.gz" install

      - name: Upload install artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscp-works-qt-macos-install
          path: ${{ github.workspace }}/vscp-works-qt-macos-install.tar.gz
