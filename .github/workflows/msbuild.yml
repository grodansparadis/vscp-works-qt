name: Windows Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  TRIPLET: x64-windows

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtcharts qtconnectivity qtserialbus qtserialport qtwebsockets
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest
          ninjaVersion: latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Install dependencies
        shell: pwsh
        run: |
          vcpkg install curl:${env:TRIPLET}
          vcpkg install dlfcn-win32:${env:TRIPLET}
          vcpkg install expat:${env:TRIPLET}
          vcpkg install mosquitto:${env:TRIPLET}
          vcpkg install libwebsockets:${env:TRIPLET}
          vcpkg install openssl:${env:TRIPLET}
          vcpkg install pthreads:${env:TRIPLET}

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${env:BUILD_CONFIGURATION} `
            -DVCPKG_TARGET_TRIPLET=${env:TRIPLET} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_CONFIGURATION }} --parallel

      - name: Install
        shell: pwsh
        run: |
          cmake --install build --config ${{ env.BUILD_CONFIGURATION }} --prefix "${{ github.workspace }}/install"

      - name: Pack install tree
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}/install/*" -DestinationPath "${{ github.workspace }}/vscp-works-qt-windows-install.zip"

      - name: Upload install artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscp-works-qt-windows-install
          path: ${{ github.workspace }}/vscp-works-qt-windows-install.zip
